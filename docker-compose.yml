services:

  backend:
    build: ./scada-alarm-system-back
    container_name: scada_backend
    ports:
      - "8000:8000"
    env_file:
      - ./scada-alarm-system-back/.env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./scada-alarm-system-front
    container_name: scada_frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: scada_db
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=StrongPass123!
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$SA_PASSWORD\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
